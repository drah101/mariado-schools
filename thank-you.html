<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Mariado Schools</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .success-box {
            padding: 80px 10%;
            text-align: center;
            min-height: 60vh;
            display: flex;

            justify-content: center;

        }

            margin-bottom: 20px;

            display: inline-block;
            background: #002147;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

    <header>
        <nav class="navbar">
            <div class="logo"><h1>MARIADO <span>SCHOOLS</span></h1></div>
        </nav>
    </header>

    <section class="success-box">
        <div class="checkmark">✔</div>
        <h1>Message Sent Successfully!</h1>
        <p>Thank you for reaching out to <strong>Mariado Schools</strong>.</p>
        <p>Our administration team has received your inquiry and will get back to you shortly via the phone number or email provided.</p>
        
        <a href="index.html" class="back-home">Return to Home Page</a>
    </section>
